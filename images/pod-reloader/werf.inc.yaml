---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
fromImage: {{ index $.Images "builder/src" }}
final: false
# TODO: uncomment when patches will be needed
# git:
# - add: /images/pod-reloader/patches
#   to: /patches
#   stageDependencies:
#     install:
#     - '**/*'
secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}
shell:
  install:
  - cd /src
  - git clone --depth 1 -b {{ $.Versions.POD_RELOADER }} $(cat /run/secrets/SOURCE_REPO)/stakater/Reloader.git .
  # - git apply /patches/*.patch --verbose
  - rm -rf .git
---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-artifact
final: false
fromImage: {{ index $.Images "builder/golang-alpine-1.26.3" }}
import:
- image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
  add: /src
  to: /src
  before: install
mount:
{{ include "mount points for golang builds" . }}
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  install:
  - export GO_VERSION=${GOLANG_VERSION} GOPROXY=$(cat /run/secrets/GOPROXY) CGO_ENABLED=0 GOOS=linux GOARCH=amd64
  - cd /src
  - GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o /reloader main.go
  - chown 64535:64535 /reloader
  - chmod 0755 /reloader
---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}
fromImage: {{ index $.Images "base/distroless" }}
import:
- image: {{ .ModuleNamePrefix }}{{ .ImageName }}-artifact
  add: /reloader
  to: /reloader
  before: setup
imageSpec:
  config:
    entrypoint: ["/reloader"]
---
image: {{ .ImageName }}-builder
fromImage: builder/golang-bullseye
final: false
...
mount:
{{ include "mount points for golang builds" . }}
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  beforeInstall:
  {{- include "debian packages proxy" . | nindent 2 }}
  - apt update
  - DEBIAN_FRONTEND=noninteractive apt install -y musl-dev
  setup:
...
  - GOPROXY=$(cat /run/secrets/GOPROXY) go mod download
---
image: {{ .ImageName }}-ui
final: false
fromImage: builder/node-alpine-22.16
...
shell:
  install:
  - cd /ui
  {{- include "yarn3 packages proxy" . | nindent 2 }}
  - yarn install
...